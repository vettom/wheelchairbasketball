<body>

<div class="container">
  <div class="jumbotron">
    <h1>  <a href="https://vettom.github.io/aces/">

      Wheelchair Basketball Training </h1>

       </div>

<!-- Start of Body -->

<h1>Team points </h1>


<script type="text/javascript">
    function checkTotal() {
        document.listForm.total.value = '';
        var Total_Points = 0;
        var Player_Count = 0;
        for (i=0;i<document.listForm.choice.length;i++) {
          if (document.listForm.choice[i].checked) {
            Total_Points = Total_Points + parseFloat(document.listForm.choice[i].value);
            Player_Count = Player_Count + 1
            // Total_Points = Total_Points + parseInt(document.listForm.choice[i].value);
          }
        }
        Available_Points = parseFloat(15.00  - Total_Points)
        document.listForm.total.value = Total_Points;
        document.listForm.Available_Points.value = Available_Points;
        document.listForm.Player_Count.value = Player_Count;
        document.getElementById("Count").innerHTML = Player_Count;
        document.getElementById("Total").innerHTML = Total_Points;
        document.getElementById("Available_Points").innerHTML = Available_Points;

        // Section for Cell color.
        // Red = #a11b00
        // Green = #00a116
        if (Player_Count == 5 )
        { 
            document.getElementById('PCount').style.backgroundColor='#00a116'; 
        } else {
          document.getElementById('PCount').style.backgroundColor='#a11b00'; 
        }
        // Player count Header color
        if (Total_Points <= 15 )
        { 
            document.getElementById('TPoints').style.backgroundColor='#00a116'; 
        } else {
          document.getElementById('TPoints').style.backgroundColor='#a11b00'; 
        }
        // Available Points Cell
        if (Available_Points >= 0 )
        { 
            document.getElementById('APoints').style.backgroundColor='#00a116'; 
        } else {
          document.getElementById('APoints').style.backgroundColor='#a11b00'; 
        }

    }
</script>

<Table id="Table1">
<Tr><TH  id="PCount" >No:<div id=Count> 0 </div> </TH> <Th id="TPoints">Total Points <div id="Total"> 0</div>  </Th><TH id="APoints">Available_Points <div id="Available_Points">15 </div> </TH></Tr>
<!-- <Tr><TH>No:<div id=Count> 0 </div> </TH><Th>Total Points <div id="Total"> 0</div>  </Th><TH>Available_Points <div id="Available_Points">15 </div> </TH></Tr> -->
<form name="listForm">

<TR><TD><input type="checkbox" name="choice" value="5" onchange="checkTotal()"/> </TD> <TD> Jordan </TD>  <TD> 5 </TD></TR>
<TR><TD><input type="checkbox" name="choice" value="4.5" onchange="checkTotal()"/> </TD> <TD> Leanna </TD>  <TD> 4.5 </TD></TR>
<TR><TD><input type="checkbox" name="choice" value="3" onchange="checkTotal()"/> </TD> <TD> Charly </TD>  <TD> 3 </TD></TR>
<TR><TD><input type="checkbox" name="choice" value="2.5" onchange="checkTotal()"/> </TD> <TD> Chris </TD> <TD> 2.5 </TD></TR>
<TR><TD><input type="checkbox" name="choice" value="1.5" onchange="checkTotal()"/> </TD> <TD> Andy </TD>  <TD> 1.5 </TD></TR>
<TR><TD><input type="checkbox" name="choice" value="1" onchange="checkTotal()"/> </TD> <TD> Ella </TD>  <TD> 1 </TD></TR>
<TR><TD><input type="checkbox" name="choice" value="1" onchange="checkTotal()"/> </TD> <TD> Denny V </TD>  <TD> 1 </TD></TR>

</Table>
<div class="box" style="background-color:#ccc">
Player_Count: <input type="text" size="2" name="Player_Count" value="0"/>
